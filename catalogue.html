<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catalogue — AbouDev Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#020408;--card:#080d14;--card2:#0d1520;--green:#00ff88;--cyan:#00d4ff;--gold:#ffb800;--red:#ff4466;--text:#e8f4ff;--sub:#5a7a9a;--bdr:rgba(0,212,255,.1);--r:12px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(2,4,8,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr)}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
    .logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--green));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;color:#000}
    .logo-text{font-size:1.1rem;font-weight:800}
    .logo-text span{color:var(--cyan)}
    .nav-links{display:flex;align-items:center;gap:6px}
    .nav-link{padding:7px 14px;border-radius:99px;font-size:.72rem;font-weight:700;cursor:pointer;border:none;font-family:'Syne',sans-serif;color:var(--sub);background:transparent;transition:all .2s;text-decoration:none}
    .nav-link:hover{color:var(--text);background:rgba(255,255,255,.05)}
    .nav-cta{background:var(--cyan)!important;color:#000!important}

    .page-header{padding:100px 24px 40px;max-width:1100px;margin:0 auto}
    .page-title{font-size:clamp(2rem,5vw,3rem);font-weight:800;letter-spacing:-1.5px;margin-bottom:8px}
    .page-title span{color:var(--cyan)}
    .page-sub{color:var(--sub);font-size:.85rem}

    .catalogue-layout{max-width:1100px;margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:240px 1fr;gap:24px}
    @media(max-width:768px){.catalogue-layout{grid-template-columns:1fr}}

    /* SIDEBAR */
    .sidebar{position:sticky;top:80px;height:fit-content;display:flex;flex-direction:column;gap:16px}
    @media(max-width:768px){.sidebar{position:static}}
    .filter-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:20px}
    .filter-title{font-size:.7rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;font-family:'Space Mono',monospace}
    .search-input{width:100%;background:var(--card2);border:1px solid var(--bdr);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Syne',sans-serif;font-size:.8rem;outline:none;transition:border-color .15s;margin-bottom:0}
    .search-input:focus{border-color:var(--cyan)}
    .filter-options{display:flex;flex-direction:column;gap:4px}
    .filter-option{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:.75rem}
    .filter-option:hover{background:rgba(255,255,255,.04)}
    .filter-option.active{background:rgba(0,212,255,.08);color:var(--cyan)}
    .filter-dot{width:8px;height:8px;border-radius:50%;background:var(--bdr);flex-shrink:0}
    .filter-option.active .filter-dot{background:var(--cyan)}
    .filter-count{margin-left:auto;font-size:.6rem;color:var(--sub);font-family:'Space Mono',monospace}

    /* MAIN */
    .main-content{}
    .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
    .result-count{font-size:.75rem;color:var(--sub);font-family:'Space Mono',monospace}
    .sort-select{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:7px 12px;color:var(--text);font-family:'Syne',sans-serif;font-size:.75rem;outline:none;cursor:pointer}
    .view-btns{display:flex;gap:4px}
    .view-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--bdr);background:var(--card);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:all .2s}
    .view-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}

    /* GRILLE PROJETS */
    .projets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
    .projets-grid.list{grid-template-columns:1fr}

    /* CARTE */
    .projet-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:22px;transition:all .25s;cursor:pointer;position:relative;overflow:hidden}
    .projet-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--green));transform:scaleX(0);transform-origin:left;transition:transform .3s}
    .projet-card:hover{border-color:rgba(0,212,255,.3);transform:translateY(-2px);background:var(--card2)}
    .projet-card:hover::after{transform:scaleX(1)}

    .projets-grid.list .projet-card{display:flex;gap:16px;align-items:flex-start}
    .projets-grid.list .card-body{flex:1}

    .card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
    .card-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
    .card-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
    .badge{padding:3px 8px;border-radius:99px;font-size:.58rem;font-weight:700;font-family:'Space Mono',monospace}
    .badge-type{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.2)}
    .badge-version{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.15)}
    .badge-featured{background:rgba(255,184,0,.1);color:var(--gold);border:1px solid rgba(255,184,0,.2)}
    .badge-new{background:rgba(255,68,102,.1);color:var(--red);border:1px solid rgba(255,68,102,.2)}
    .card-nom{font-size:.95rem;font-weight:800;margin-bottom:5px;letter-spacing:-.3px}
    .card-desc{font-size:.72rem;color:var(--sub);line-height:1.6;margin-bottom:14px}
    .card-techs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
    .tech-tag{background:rgba(255,255,255,.04);border:1px solid var(--bdr);padding:2px 7px;border-radius:4px;font-size:.57rem;color:var(--sub)}
    .card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .card-stats{display:flex;gap:10px}
    .cstat{font-size:.6rem;color:var(--sub);display:flex;align-items:center;gap:3px;font-family:'Space Mono',monospace}
    .card-actions{display:flex;gap:6px}
    .btn-card{padding:6px 12px;border-radius:7px;font-size:.62rem;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s;border:none}
    .btn-demo{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);color:var(--cyan)}
    .btn-demo:hover{background:var(--cyan);color:#000}
    .btn-dl{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.15);color:var(--green)}
    .btn-dl:hover{background:var(--green);color:#000}

    /* MODAL PROJET */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:200;overflow-y:auto;padding:20px}
    .modal-bg.on{display:flex;align-items:flex-start;justify-content:center}
    .modal{background:var(--card);border:1px solid rgba(0,212,255,.2);border-radius:16px;padding:32px;width:100%;max-width:700px;margin:auto;position:relative}
    .modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:8px;width:32px;height:32px;cursor:pointer;color:var(--sub);font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .modal-close:hover{background:rgba(255,68,102,.15);color:var(--red);border-color:rgba(255,68,102,.3)}
    .modal-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px}
    .modal-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}
    .modal-nom{font-size:1.4rem;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
    .modal-badges{display:flex;gap:6px;flex-wrap:wrap}
    .modal-desc{color:var(--sub);font-size:.8rem;line-height:1.7;margin-bottom:24px}
    .modal-section-title{font-size:.65rem;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;font-family:'Space Mono',monospace;display:flex;align-items:center;gap:8px}
    .modal-section-title::after{content:'';flex:1;height:1px;background:var(--bdr)}
    .fonct-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
    @media(max-width:500px){.fonct-grid{grid-template-columns:1fr}}
    .fonct-item{background:var(--card2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;font-size:.72rem;display:flex;align-items:center;gap:8px}
    .fonct-item::before{content:'✓';color:var(--green);font-weight:800;flex-shrink:0}
    .tech-list{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:24px}
    .tech-badge{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.15);color:var(--cyan);padding:4px 10px;border-radius:6px;font-size:.65rem;font-family:'Space Mono',monospace}
    .versions-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
    .ver-item{display:flex;gap:12px;align-items:flex-start;padding:10px;background:var(--card2);border-radius:8px}
    .ver-num{font-family:'Space Mono',monospace;color:var(--cyan);font-size:.7rem;font-weight:700;white-space:nowrap;padding-top:2px}
    .ver-info{flex:1}
    .ver-date{font-size:.6rem;color:var(--sub);margin-bottom:2px;font-family:'Space Mono',monospace}
    .ver-notes{font-size:.72rem;line-height:1.5}
    .modal-footer{display:flex;gap:10px;flex-wrap:wrap;padding-top:20px;border-top:1px solid var(--bdr)}
    .btn-modal{padding:11px 20px;border-radius:10px;font-size:.78rem;font-weight:800;cursor:pointer;font-family:'Syne',sans-serif;border:none;transition:all .2s;display:flex;align-items:center;gap:7px}
    .btn-modal-primary{background:var(--cyan);color:#000}
    .btn-modal-primary:hover{background:#33ddff}
    .btn-modal-outline{background:transparent;border:1px solid var(--bdr);color:var(--text)}
    .btn-modal-outline:hover{border-color:var(--cyan);color:var(--cyan)}
    .modal-stats{display:flex;gap:20px;margin-bottom:24px}
    .mstat{text-align:center;background:var(--card2);border-radius:8px;padding:12px 16px;flex:1}
    .mstat-val{font-size:1.2rem;font-weight:800;font-family:'Space Mono',monospace;color:var(--cyan)}
    .mstat-label{font-size:.6rem;color:var(--sub);margin-top:3px}

    /* EMPTY */
    .empty{text-align:center;padding:60px 20px;color:var(--sub)}
    .empty-icon{font-size:3rem;margin-bottom:12px}
    .empty-title{font-size:.9rem;font-weight:700;margin-bottom:6px}
    .empty-sub{font-size:.75rem}

    /* LOADING */
    .loading{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--sub);font-size:.78rem;padding:60px;font-family:'Space Mono',monospace}
    .loading::before{content:'';width:16px;height:16px;border-radius:50%;border:2px solid var(--bdr);border-top-color:var(--cyan);animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--cyan);color:#000;padding:10px 22px;border-radius:99px;font-weight:800;font-size:.75rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999}
    .toast.on{opacity:1}
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <div class="logo-icon">A</div>
    <div class="logo-text">Abou<span>Dev</span></div>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link">Accueil</a>
    <a href="#" class="nav-link">Catalogue</a>
    <a href="/#contact" class="nav-link">Contact</a>
    <a href="/admin" class="nav-link nav-cta">Admin</a>
  </div>
</nav>

<div class="page-header">
  <h1 class="page-title">Catalogue <span>complet</span></h1>
  <p class="page-sub">Tous les projets d'Aboudev Labs — APIs, jeux, outils, applications</p>
</div>

<div class="catalogue-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="filter-card">
      <div class="filter-title">🔍 Recherche</div>
      <input type="text" class="search-input" id="search" placeholder="Nom, technologie..." oninput="filtrer()">
    </div>

    <div class="filter-card">
      <div class="filter-title">📁 Type</div>
      <div class="filter-options" id="filter-types">
        <div class="filter-option active" data-type="" onclick="setType(this,'')">
          <div class="filter-dot"></div> Tous
          <span class="filter-count" id="cnt-all">0</span>
        </div>
        <div class="filter-option" data-type="API" onclick="setType(this,'API')">
          <div class="filter-dot"></div> 🔌 APIs
          <span class="filter-count" id="cnt-api">0</span>
        </div>
        <div class="filter-option" data-type="Jeu Web" onclick="setType(this,'Jeu Web')">
          <div class="filter-dot"></div> 🎮 Jeux Web
          <span class="filter-count" id="cnt-jeu">0</span>
        </div>
        <div class="filter-option" data-type="E-commerce" onclick="setType(this,'E-commerce')">
          <div class="filter-dot"></div> 🛍️ E-commerce
          <span class="filter-count" id="cnt-ecom">0</span>
        </div>
        <div class="filter-option" data-type="Outil" onclick="setType(this,'Outil')">
          <div class="filter-dot"></div> 🔧 Outils Dev
          <span class="filter-count" id="cnt-outil">0</span>
        </div>
        <div class="filter-option" data-type="Application" onclick="setType(this,'Application')">
          <div class="filter-dot"></div> 📱 Applications
          <span class="filter-count" id="cnt-app">0</span>
        </div>
        <div class="filter-option" data-type="Éducation" onclick="setType(this,'Éducation')">
          <div class="filter-dot"></div> 📚 Éducation
          <span class="filter-count" id="cnt-edu">0</span>
        </div>
      </div>
    </div>

    <div class="filter-card">
      <div class="filter-title">⚡ Technologies</div>
      <div class="filter-options" id="filter-techs"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="toolbar">
      <div class="result-count" id="result-count">Chargement...</div>
      <div style="display:flex;gap:8px;align-items:center">
        <select class="sort-select" onchange="trier(this.value)">
          <option value="date">Plus récents</option>
          <option value="popular">Plus populaires</option>
          <option value="nom">Nom A→Z</option>
          <option value="dl">Téléchargements</option>
        </select>
        <div class="view-btns">
          <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Grille">⊞</button>
          <button class="view-btn" id="btn-list" onclick="setView('list')" title="Liste">≡</button>
        </div>
      </div>
    </div>
    <div class="projets-grid" id="projets-grid">
      <div class="loading">Chargement...</div>
    </div>
  </main>
</div>

<!-- MODAL PROJET -->
<div class="modal-bg" id="modal">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="fermerModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let tousLesProjets = [];
let typeActif = '';
let viewMode = 'grid';
let sortMode = 'date';

function toast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=ok?'var(--cyan)':'#ff4466';
  t.classList.add('on');setTimeout(()=>t.classList.remove('on'),3000);
}

function iconeType(t){
  return {'API':'🔌','Jeu Web':'🎮','E-commerce':'🛍️','Outil':'🔧','Application':'📱','Éducation':'📚','Langage':'⌨️','Plateforme':'🌐'}[t]||'📦';
}
function couleurType(t){
  return {'API':'rgba(0,212,255,.15)','Jeu Web':'rgba(0,255,136,.1)','E-commerce':'rgba(255,184,0,.1)','Outil':'rgba(180,0,255,.1)','Application':'rgba(255,90,0,.1)','Éducation':'rgba(0,150,255,.1)'}[t]||'rgba(255,255,255,.05)';
}

function setType(el,type){
  document.querySelectorAll('.filter-option').forEach(o=>o.classList.remove('active'));
  el.classList.add('active');
  typeActif=type;
  filtrer();
}

function setView(v){
  viewMode=v;
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
  const grid=document.getElementById('projets-grid');
  grid.classList.toggle('list',v==='list');
}

function trier(mode){
  sortMode=mode;
  filtrer();
}

function filtrer(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  let liste=[...tousLesProjets];
  if(typeActif) liste=liste.filter(p=>p.type===typeActif);
  if(q) liste=liste.filter(p=>
    p.nom.toLowerCase().includes(q)||
    (p.description_courte||'').toLowerCase().includes(q)||
    (p.technologies||[]).some(t=>t.toLowerCase().includes(q))
  );
  if(sortMode==='popular') liste.sort((a,b)=>b.vues-a.vues);
  else if(sortMode==='dl') liste.sort((a,b)=>b.telechargements-a.telechargements);
  else if(sortMode==='nom') liste.sort((a,b)=>a.nom.localeCompare(b.nom));
  else liste.sort((a,b)=>new Date(b.date_publication)-new Date(a.date_publication));
  afficher(liste);
}

function afficher(liste){
  const grid=document.getElementById('projets-grid');
  document.getElementById('result-count').textContent=`${liste.length} projet${liste.length>1?'s':''}`;
  if(!liste.length){
    grid.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Aucun projet trouvé</div><div class="empty-sub">Modifiez vos filtres</div></div>`;
    return;
  }
  grid.innerHTML=liste.map(p=>`
    <div class="projet-card" onclick="voirProjet('${p.id}')">
      <div class="card-top">
        <div class="card-icon" style="background:${couleurType(p.type)}">${iconeType(p.type)}</div>
        <div class="card-badges">
          ${p.featured?'<span class="badge badge-featured">⭐ Vedette</span>':''}
          <span class="badge badge-type">${p.type}</span>
          <span class="badge badge-version">v${p.version}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-nom">${p.nom}</div>
        <div class="card-desc">${p.description_courte}</div>
        <div class="card-techs">${(p.technologies||[]).slice(0,3).map(t=>`<span class="tech-tag">${t}</span>`).join('')}</div>
        <div class="card-footer">
          <div class="card-stats">
            <span class="cstat">👁 ${p.vues||0}</span>
            <span class="cstat">⬇ ${p.telechargements||0}</span>
          </div>
          <div class="card-actions">
            ${p.lien_demo?`<button class="btn-card btn-demo" onclick="event.stopPropagation();window.open('${p.lien_demo}','_blank')">🌐 Demo</button>`:''}
            <button class="btn-card btn-dl" onclick="event.stopPropagation();telecharger('${p.id}')">⬇ DL</button>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function mettreAJourCompteurs(projets){
  const types={'':projets.length,'API':0,'Jeu Web':0,'E-commerce':0,'Outil':0,'Application':0,'Éducation':0};
  const map={'':'cnt-all','API':'cnt-api','Jeu Web':'cnt-jeu','E-commerce':'cnt-ecom','Outil':'cnt-outil','Application':'cnt-app','Éducation':'cnt-edu'};
  projets.forEach(p=>{if(types[p.type]!==undefined)types[p.type]++;});
  Object.entries(map).forEach(([type,id])=>{
    const el=document.getElementById(id);
    if(el) el.textContent=types[type]||0;
  });
  // Techs
  const allTechs={};
  projets.forEach(p=>(p.technologies||[]).forEach(t=>{allTechs[t]=(allTechs[t]||0)+1}));
  const topTechs=Object.entries(allTechs).sort((a,b)=>b[1]-a[1]).slice(0,8);
  document.getElementById('filter-techs').innerHTML=topTechs.map(([t,c])=>`
    <div class="filter-option" onclick="filterByTech('${t}')">
      <div class="filter-dot"></div>${t}
      <span class="filter-count">${c}</span>
    </div>`).join('');
}

function filterByTech(tech){
  document.getElementById('search').value=tech;
  filtrer();
}

async function telecharger(id){
  try{
    await fetch(`${API}/api/v1/projets/${id}/telecharger`,{method:'POST'});
    toast('⬇️ Téléchargement comptabilisé !');
    const p=tousLesProjets.find(x=>x.id===id);
    if(p) p.telechargements=(p.telechargements||0)+1;
  }catch(e){}
}

async function voirProjet(id){
  const p=tousLesProjets.find(x=>x.id===id);
  if(!p) return;
  // Incrémenter vues
  try{await fetch(`${API}/api/v1/projets/${id}`);}catch(e){}
  document.getElementById('modal-body').innerHTML=`
    <div class="modal-header">
      <div class="modal-icon" style="background:${couleurType(p.type)}">${iconeType(p.type)}</div>
      <div>
        <div class="modal-nom">${p.nom}</div>
        <div class="modal-badges">
          ${p.featured?'<span class="badge badge-featured">⭐ Vedette</span>':''}
          <span class="badge badge-type">${p.type}</span>
          <span class="badge badge-version">v${p.version}</span>
        </div>
      </div>
    </div>

    <div class="modal-stats">
      <div class="mstat"><div class="mstat-val">${p.vues||0}</div><div class="mstat-label">Vues</div></div>
      <div class="mstat"><div class="mstat-val">${p.telechargements||0}</div><div class="mstat-label">Téléchargements</div></div>
      <div class="mstat"><div class="mstat-val">${(p.versions||[]).length}</div><div class="mstat-label">Versions</div></div>
    </div>

    <div class="modal-desc">${p.description||p.description_courte}</div>

    ${p.fonctionnalites?.length?`
    <div class="modal-section-title">Fonctionnalités</div>
    <div class="fonct-grid">${p.fonctionnalites.map(f=>`<div class="fonct-item">${f}</div>`).join('')}</div>`:''}

    <div class="modal-section-title">Technologies</div>
    <div class="tech-list">${(p.technologies||[]).map(t=>`<span class="tech-badge">${t}</span>`).join('')}</div>

    ${p.versions?.length?`
    <div class="modal-section-title">Historique versions</div>
    <div class="versions-list">${[...p.versions].reverse().map(v=>`
      <div class="ver-item">
        <div class="ver-num">v${v.version}</div>
        <div class="ver-info">
          <div class="ver-date">${v.date}</div>
          <div class="ver-notes">${v.notes}</div>
        </div>
      </div>`).join('')}</div>`:''}

    <div class="modal-footer">
      ${p.lien_demo?`<button class="btn-modal btn-modal-primary" onclick="window.open('${p.lien_demo}','_blank')">🌐 Voir la démo</button>`:''}
      ${p.lien_github?`<button class="btn-modal btn-modal-outline" onclick="window.open('${p.lien_github}','_blank')">💻 GitHub</button>`:''}
      <button class="btn-modal btn-modal-outline" onclick="telecharger('${p.id}');toast('⬇️ Comptabilisé !')">⬇️ Télécharger</button>
    </div>`;
  document.getElementById('modal').classList.add('on');
}

function fermerModal(){
  document.getElementById('modal').classList.remove('on');
}
document.getElementById('modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal')) fermerModal();
});

async function chargerProjets(){
  try{
    const res=await fetch(`${API}/api/v1/projets`);
    const data=await res.json();
    tousLesProjets=data.projets||[];
    filtrer();
    mettreAJourCompteurs(tousLesProjets);
  }catch(e){
    document.getElementById('projets-grid').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Serveur non disponible</div><div class="empty-sub">Vérifiez votre connexion</div></div>';
  }
}

// Ouvrir depuis URL ?projet=id
const urlParams=new URLSearchParams(window.location.search);
const projetId=urlParams.get('projet');

chargerProjets().then(()=>{
  if(projetId) setTimeout(()=>voirProjet(projetId),500);
});
</script>
</body>
</html>
